version: '3'

services:

  nats-server:
    image: nats:lastest
    ports:
      - '8222:8222'
  cliente-gateway:
    build: ./cliente-gateway
    ports:
      - '3000:3000'
    volumes:
      - ./client-gateway/src:/usr/src/app/src
    command: npm run start:dev
    environment:
      - PORT=3000
      - NATS_SERVERS=nats://nats-server:4222
  
  product-ms:
    build: ./product-ms
    volumes:
      - ./product-ms/src:/usr/src/app/src
    command: npm run start:dev
    environment:
      - PORT=3001
      - NATS_SERVERS=nats://nats-server:4222
      - DATABASE_URL=file:./dev.db
